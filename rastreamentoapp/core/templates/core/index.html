<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreamento Veicular</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([-23.55052, -46.633308], 15); // coordenadas iniciais

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  let marker = null;

  async function atualizarLocalizacao() {
    try {
      const responseLocation = await fetch('http://127.0.0.1:8000/api/v1/vehicles/2ca37d2b-c229-4fa2-94a8-82cab49e8003/recent_locations/'); // Substitua pela URL da sua API real
      const dataLocation = await responseLocation.json();

      const responseVehicle = await fetch('http://127.0.0.1:8000/api/v1/vehicles/2ca37d2b-c229-4fa2-94a8-82cab49e8003/'); // Substitua pela URL da sua API real
      const dataVehicle = await responseVehicle.json();

      console.log(` ---->>>> ${dataVehicle}`)
      console.log("Resposta da API:", JSON.stringify(dataVehicle, null, 2));

      //const dadosVehicle = JSON.stringify(dataVehicle, null, 2);
      const typeVehicle = dataVehicle["model"]
      const placaVehicle = dataVehicle["plate"]
      console.log("Modelo:", typeVehicle);
      console.log("Placa:", placaVehicle);

      const ultimaLocalizacao = dataLocation[dataLocation.length - 1];
      const latitude = ultimaLocalizacao?.latitude;
      const longitude = ultimaLocalizacao?.longitude;
      //consolo.log(`---->>>>> %${latitude, longitude}`)

      if (!latitude || !longitude) {
        throw new Error("Coordenadas inválidas ou ausentes");
    }
      map.setView([latitude, longitude]);

      const popupText = `
        <strong>Veículo:</strong> ${typeVehicle} - ${placaVehicle}<br>
      `;

      console.log(typeof(marker))
      
      if (marker) {
        marker.setLatLng([latitude, longitude]).setPopupContent(popupText);
      } else {
        marker = L.marker([latitude, longitude])
          .addTo(map)
          .bindPopup(popupText)
          .openPopup();
      }

      //map.setView([latitude, longitude]);

    } catch (error) {
      console.error("Erro ao buscar localização:", error);
    }
  }

  atualizarLocalizacao();
  setInterval(atualizarLocalizacao, 5000); // atualiza a cada 5 segundos
</script>

</body>
</html>
