#version: '3.9'

services:
  rastreamentoapp:
    container_name: rastreamentoapp
    build:
      context: .
    ports:
      - 8000:8000
    volumes:
      - ./rastreamentoapp:/rastreamentoapp
      - ./data/web/static:/data/web/static/
      - ./data/web/media:/data/web/media/
    env_file:
      - ./dotenv_files/.env
    depends_on:
      - psql_rastreamento
  psql_rastreamento:
    container_name: psql_rastreamento
    image: postgres:14-alpine
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data/
    env_file:
      - ./dotenv_files/.env
